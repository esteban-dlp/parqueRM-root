services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: parqueRM-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - parqueRM-net
    restart: unless-stopped
    # Healthcheck: SQL Server 2022 expone sqlcmd en /opt/mssql-tools18/bin.
    # $$MSSQL_SA_PASSWORD: el $$ le dice a Compose que NO sustituya — el shell
    # del contenedor expande $MSSQL_SA_PASSWORD desde su propio environment.
    # start_period: le da 30 s a SQL Server para arrancar antes de contar fallos.
    healthcheck:
      test: ["CMD-SHELL", "SQLCMDPASSWORD=$$MSSQL_SA_PASSWORD /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -Q 'SELECT 1' -b -No"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: parqueRM-db-init
    depends_on:
      sqlserver:
        condition: service_healthy   # espera al healthcheck de SQL Server
    volumes:
      - ./db/init:/scripts
    environment:
      SQLSERVER_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
    # Sin sleep: sqlserver ya pasó su healthcheck cuando llegamos aquí.
    command: >
      /bin/bash -c "
      echo 'SQL Server listo — ejecutando scripts de inicialización...' &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -i /scripts/01_create_database.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -d ParqueRM -i /scripts/02_schema.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -d ParqueRM -i /scripts/03_seed_security.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -d ParqueRM -i /scripts/04_seed_catalogs.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -d ParqueRM -i /scripts/05_seed_tariffs.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -d ParqueRM -i /scripts/06_seed_park_config.sql &&
      /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P \"${SQLSERVER_SA_PASSWORD}\" -d ParqueRM -i /scripts/07_seed_demo_data.sql &&
      echo 'Base de datos inicializada correctamente.'
      "
    networks:
      - parqueRM-net
    restart: "no"

  backend:
    build:
      context: ../parqueRM-backend
      dockerfile: Dockerfile
    container_name: parqueRM-backend
    environment:
      NODE_ENV: production
      PORT: 3000

      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_USER: sa
      DB_PASSWORD: "${SQLSERVER_SA_PASSWORD}"
      DB_NAME: ParqueRM

      JWT_SECRET: "${JWT_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"

      UPLOADS_PATH: /app/uploads
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      sqlserver:
        condition: service_healthy              # SQL Server acepta conexiones
      db-init:
        condition: service_completed_successfully  # scripts corrieron sin error
    networks:
      - parqueRM-net
    restart: unless-stopped

  frontend:
    build:
      context: ../parqueRM-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL}"
    container_name: parqueRM-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - parqueRM-net
    restart: unless-stopped

volumes:
  sqlserver_data:
  uploads_data:

networks:
  parqueRM-net:
    driver: bridge
